{% extends "base.html" %}

{% block title %}チャットボット{% endblock %}

{% block content %}
<div class="chat-container">
    <header class="chat-header">
        <h1>Web検索連動チャットボット</h1>
        <p class="subtitle">質問に答え、必要に応じてWeb検索します</p>
    </header>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <div class="message-content">
                <p>こんにちは！メッセージを入力してください。</p>
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <div class="input-wrapper">
            <input
                type="text"
                id="userInput"
                placeholder="メッセージを入力..."
                onkeypress="handleKeyPress(event)"
            />
            <button id="sendButton" onclick="sendMessage()">送信</button>
        </div>
    </div>
</div>

<script>
    // セッションIDを生成（ページロード時に1回だけ）
    const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    }

    function addMessage(content, isUser = false) {
        const messagesDiv = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = `<p>${content}</p>`;

        messageDiv.appendChild(contentDiv);
        messagesDiv.appendChild(messageDiv);

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();

        if (!message) return;

        addMessage(message, true);
        input.value = '';

        const sendButton = document.getElementById('sendButton');
        sendButton.disabled = true;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    session_id: sessionId
                }),
            });

            const data = await response.json();

            if (data.status === 'success') {
                addMessage(data.response, false);
            } else {
                addMessage('エラー: ' + (data.error || '不明なエラーが発生しました'), false);
            }
        } catch (error) {
            addMessage('通信エラーが発生しました: ' + error.message, false);
        } finally {
            sendButton.disabled = false;
            input.focus();
        }
    }
</script>
{% endblock %}
